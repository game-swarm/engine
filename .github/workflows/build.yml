name: Build and publish engine

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/game-swarm/engine

jobs:
  release-load-profile:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out engine
        uses: actions/checkout@v7
        with:
          path: engine
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - name: Fetch pinned mods
        working-directory: engine
        run: ./scripts/fetch-mods.sh
      - name: Verify dependency identity
        working-directory: engine
        run: cargo test --locked -p swarm-engine --test dependency_identity --features vanilla_mods
      - name: Check all Engine targets
        working-directory: engine
        run: cargo check --locked --all-targets --features vanilla_mods
      - name: Install TypeScript SDK dependencies
        working-directory: engine/sdk-templates/ts
        run: npm ci
      - name: Test all Engine targets
        working-directory: engine
        run: cargo test --locked --all-targets --features vanilla_mods
      - name: Run release load profile
        working-directory: engine
        run: timeout 25m cargo test -q -p swarm-engine --release --test load release_load_profile_100_players_500_ticks -- --ignored --exact

  build:
    needs: release-load-profile
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out engine
        uses: actions/checkout@v7
        with:
          path: engine
      - name: Fetch pinned mods
        working-directory: engine
        run: ./scripts/fetch-mods.sh
      - uses: docker/setup-buildx-action@v4
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
      - if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: engine/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
