[meta]
name = "resource-decay"
version = "0.1.0"
description = "Resource and fatigue decay system — aging, cooldown, and decay mechanics for Swarm"
author = "Swarm Team"

[dependencies]

[config]
decay_rate = { type = "int", default = 1, description = "Resource units decayed per tick" }
decay_threshold = { type = "int", default = 100, description = "Minimum resource level before decay activates" }

[compatibility]
engine_abi_min = "1.0"
