[meta]
name = "vanilla-boss"
version = "0.1.0"
description = "Vanilla boss encounters for World and Arena modes"
author = "Swarm Team"

[dependencies]
pve-spawning = ">=0.1.0"
combat-core = ">=0.1.0"

[config]
boss_templates = { type = "string", default = "", description = "JSON boss template definitions" }
arena_bosses_enabled = { type = "bool", default = true, description = "Enable arena boss encounters" }
world_bosses_enabled = { type = "bool", default = false, description = "Enable world boss encounters" }

[compatibility]
engine_abi_min = "1.0"
