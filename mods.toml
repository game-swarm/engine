# Engine mod sources
# Each mod is fetched from its git repository at build time.
# Local dev: run `scripts/fetch-mods.sh` to populate the sibling mods/ directory.
# Container builds must fetch these repositories before invoking Docker.
#
# To use a local checkout instead of git, set `path` instead of `git` + `rev`.
# Format: name = { git = "url", rev = "commit-sha" }
#         name = { path = "/path/to/local/checkout" }

[mods]
combat-core = { git = "https://github.com/game-swarm/mod-combat-core.git", rev = "a14e0d2cc74d00edf781857475d26cca1e1866c6" }
empire-upkeep = { git = "https://github.com/game-swarm/mod-empire-upkeep.git", rev = "407075b4d0881b29611b14ba85a35e95b5181bb4" }
fog-of-war = { git = "https://github.com/game-swarm/mod-fog-of-war.git", rev = "3dbad4ca501fbffdbf9db25d55848e2d56c9688a" }
pve-spawning = { git = "https://github.com/game-swarm/mod-pve-spawning.git", rev = "8b4d543caa68e5f2b0898e9d2a65235f4a1a13ba" }
resource-decay = { git = "https://github.com/game-swarm/mod-resource-decay.git", rev = "24113aad251d9738a445831a56ac3713bd8758e8" }
special-attacks = { git = "https://github.com/game-swarm/mod-special-attacks.git", rev = "d283f0bf1ee5f1cb586a37143593c4135ac47284" }
depot-storage = { git = "https://github.com/game-swarm/mod-depot-storage.git", rev = "bd9c5a8a7d2d789acbb3b0a9dcac47896e215383" }
vanilla-boss = { git = "https://github.com/game-swarm/mod-vanilla-boss.git", rev = "95f660bd18da0e6fa79615ad59f345c050265820" }
