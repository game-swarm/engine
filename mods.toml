# Engine mod sources
# Each mod is fetched from its git repository at build time.
# Local dev: run `scripts/fetch-mods.sh` to populate engine/mods/.
# Docker build: the Dockerfile runs fetch-mods.sh automatically.
#
# To use a local checkout instead of git, set `path` instead of `git` + `rev`.
# Format: name = { git = "url", rev = "commit-sha" }
#         name = { path = "/path/to/local/checkout" }

[mods]
combat-core = { git = "https://github.com/game-swarm/mod-combat-core.git", rev = "057350deb6f0d6aa42b4317df8de52afd7977d13" }
empire-upkeep = { git = "https://github.com/game-swarm/mod-empire-upkeep.git", rev = "5706bea2eeb0e3c4f2216066d79e262c06ad1330" }
fog-of-war = { git = "https://github.com/game-swarm/mod-fog-of-war.git", rev = "951624df6a5813acc2130b9de8182f2309d68e25" }
pve-spawning = { git = "https://github.com/game-swarm/mod-pve-spawning.git", rev = "af1aa32328a81f949e5824440a28b248edbef547" }
resource-decay = { git = "https://github.com/game-swarm/mod-resource-decay.git", rev = "17e94f845be634dc8aa49603325a2900b7462ea5" }
special-attacks = { git = "https://github.com/game-swarm/mod-special-attacks.git", rev = "5ef1bc07956310c222b34fc152266c1b0fde1a95" }
depot-storage = { git = "https://github.com/game-swarm/mod-depot-storage.git", rev = "2996323f708f74c0c683b06d32b9598c974e76e0" }
vanilla-boss = { git = "https://github.com/game-swarm/mod-vanilla-boss.git", rev = "c015ecf8bfddcf6f035cc82dc1f4c1e3a8029b5f" }
