# Engine mod sources
# Each mod is fetched from its git repository at build time.
# Local dev: run `scripts/fetch-mods.sh` to populate engine/mods/.
# Docker build: the Dockerfile runs fetch-mods.sh automatically.
#
# To use a local checkout instead of git, set `path` instead of `git` + `rev`.
# Format: name = { git = "url", rev = "commit-sha" }
#         name = { path = "/path/to/local/checkout" }

[mods]
combat-core = { git = "https://github.com/game-swarm/mod-combat-core.git", rev = "d387f29ff6a2b658a14d9c9fe210ddaa249e2f44" }
empire-upkeep = { git = "https://github.com/game-swarm/mod-empire-upkeep.git", rev = "38dc10f17cf5238eec4333706e3f2b10a3c443c9" }
fog-of-war = { git = "https://github.com/game-swarm/mod-fog-of-war.git", rev = "33f015c045be4b4d70657e7b28a49cd1f67061be" }
pve-spawning = { git = "https://github.com/game-swarm/mod-pve-spawning.git", rev = "a610570372572aecf451e70449e1da120746a020" }
resource-decay = { git = "https://github.com/game-swarm/mod-resource-decay.git", rev = "3da39d3b842efec97da3cd3b49939e5fd22bb6a9" }
special-attacks = { git = "https://github.com/game-swarm/mod-special-attacks.git", rev = "cf85a1be3522b1412d25ed3ad5f41c1dfe092c1c" }
depot-storage = { git = "https://github.com/game-swarm/mod-depot-storage.git", rev = "d5cea15f8460ae91f0164a3862dc554e4e738539" }
vanilla-boss = { git = "https://github.com/game-swarm/mod-vanilla-boss.git", rev = "ff25b16a6bdd244d5e00ea2fcab313cb163fcbed" }
