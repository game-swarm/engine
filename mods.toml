# Engine mod sources
# Each mod is fetched from its git repository at build time.
# Local dev: run `scripts/fetch-mods.sh` to populate the sibling mods/ directory.
# Container builds must fetch these repositories before invoking Docker.
#
# To use a local checkout instead of git, set `path` instead of `git` + `rev`.
# Format: name = { git = "url", rev = "commit-sha" }
#         name = { path = "/path/to/local/checkout" }

[mods]
combat-core = { git = "https://github.com/game-swarm/mod-combat-core.git", rev = "2caefa9c0f60f7049b628451fadc7a9062b42dcf" }
empire-upkeep = { git = "https://github.com/game-swarm/mod-empire-upkeep.git", rev = "6c7bdfd371331b736a2fce580e45f5c81b3d8821" }
fog-of-war = { git = "https://github.com/game-swarm/mod-fog-of-war.git", rev = "3fd9fcd8b31b4dfdf0e09b10c0c3f40488ab91a4" }
pve-spawning = { git = "https://github.com/game-swarm/mod-pve-spawning.git", rev = "5a27117146c1691025090a81c2b5f9a58378a4b7" }
resource-decay = { git = "https://github.com/game-swarm/mod-resource-decay.git", rev = "3d4eacda5f8174fc65f5946998524ba93b8958cd" }
special-attacks = { git = "https://github.com/game-swarm/mod-special-attacks.git", rev = "90dad38abe731f1a41521908b89fe16cdb487f84" }
depot-storage = { git = "https://github.com/game-swarm/mod-depot-storage.git", rev = "1ddd11352f6eff7c38b5d66fd5e8affcf7d2839f" }
vanilla-boss = { git = "https://github.com/game-swarm/mod-vanilla-boss.git", rev = "3ffc770000ad0a12d19c7e055d6c219d2ef0c55c" }
