# Engine mod sources
# Each mod is fetched from its git repository at build time.
# Local dev: run `scripts/fetch-mods.sh` to populate engine/mods/.
# Docker build: the Dockerfile runs fetch-mods.sh automatically.
#
# To use a local checkout instead of git, set `path` instead of `git` + `rev`.
# Format: name = { git = "url", rev = "commit-sha" }
#         name = { path = "/path/to/local/checkout" }

[mods]
combat-core = { git = "https://github.com/game-swarm/mod-combat-core.git", rev = "149fb7cb82761682870c4a232d42b837d944c924" }
empire-upkeep = { git = "https://github.com/game-swarm/mod-empire-upkeep.git", rev = "6ac10e3069281c97335c4e3298b12a2320c4e3d7" }
fog-of-war = { git = "https://github.com/game-swarm/mod-fog-of-war.git", rev = "0e5a5579fd346d2ee74f30fc23e819ba2fed6e07" }
pve-spawning = { git = "https://github.com/game-swarm/mod-pve-spawning.git", rev = "14137a44b0e6d42676fd834b488fed428d53613d" }
resource-decay = { git = "https://github.com/game-swarm/mod-resource-decay.git", rev = "d8698f90f7c639f084eff03116e67b2537e95a21" }
special-attacks = { git = "https://github.com/game-swarm/mod-special-attacks.git", rev = "cfc585a5a278ab3893a3459defee2bb79ff67ae4" }
depot-storage = { git = "https://github.com/game-swarm/mod-depot-storage.git", rev = "8ab8b6a66315188debf39b882c1ecdc6b4c3df0b" }
vanilla-boss = { git = "https://github.com/game-swarm/mod-vanilla-boss.git", rev = "2bfc145968ba93564bf71fe5ac5aeec019d87a2c" }
