# Engine mod sources
# Each mod is fetched from its git repository at build time.
# Local dev: run `scripts/fetch-mods.sh` to populate engine/mods/.
# Docker build: the Dockerfile runs fetch-mods.sh automatically.
#
# To use a local checkout instead of git, set `path` instead of `git` + `rev`.
# Format: name = { git = "url", rev = "commit-sha" }
#         name = { path = "/path/to/local/checkout" }

[mods]
combat-core = { git = "https://github.com/game-swarm/mod-combat-core.git", rev = "7cebf8305c9f4dc7e203f3925e361611760be833" }
empire-upkeep = { git = "https://github.com/game-swarm/mod-empire-upkeep.git", rev = "f7cbb32bf952427e7b9c5ea287ebe11190e21187" }
fog-of-war = { git = "https://github.com/game-swarm/mod-fog-of-war.git", rev = "2f44f2402b6b7c754e1abcabba0dccfd58ed45d9" }
pve-spawning = { git = "https://github.com/game-swarm/mod-pve-spawning.git", rev = "0a42c2ad7c593db50d6871b2604a7b5fc80fb169" }
resource-decay = { git = "https://github.com/game-swarm/mod-resource-decay.git", rev = "2c3eb19be4dbbfd52394a520fa1269254b52b1ee" }
special-attacks = { git = "https://github.com/game-swarm/mod-special-attacks.git", rev = "b806d650cb8426c5956e562f700e4c93bfc4b09d" }
depot-storage = { git = "https://github.com/game-swarm/mod-depot-storage.git", rev = "2e319a2946e9330e7da1071712a291d1464b5dd9" }
vanilla-boss = { git = "https://github.com/game-swarm/mod-vanilla-boss.git", rev = "049fec3b43cf513ce5c88b2cc5ce1a6f0d931efb" }
