# Engine mod sources
# Each mod is fetched from its git repository at build time.
# Local dev: run `scripts/fetch-mods.sh` to populate the sibling mods/ directory.
# Container builds must fetch these repositories before invoking Docker.
#
# To use a local checkout instead of git, set `path` instead of `git` + `rev`.
# Format: name = { git = "url", rev = "commit-sha" }
#         name = { path = "/path/to/local/checkout" }

[mods]
combat-core = { git = "https://github.com/game-swarm/mod-combat-core.git", rev = "138749a8ad60a6a8a91be4801c93869ae88053ef" }
empire-upkeep = { git = "https://github.com/game-swarm/mod-empire-upkeep.git", rev = "b979655b09af1ec0bb5503301b7314d617224955" }
fog-of-war = { git = "https://github.com/game-swarm/mod-fog-of-war.git", rev = "2f50821f71cb3e1ce23c4b418bb128126be1da82" }
pve-spawning = { git = "https://github.com/game-swarm/mod-pve-spawning.git", rev = "5d46e47ed0d1fa463af20dc3fc8317ba83448fec" }
resource-decay = { git = "https://github.com/game-swarm/mod-resource-decay.git", rev = "776cdbcf7ed188b283cc4fbb68266ca28db5efd1" }
special-attacks = { git = "https://github.com/game-swarm/mod-special-attacks.git", rev = "23878f59968f23bea35e2b12e86fc9009c525be9" }
depot-storage = { git = "https://github.com/game-swarm/mod-depot-storage.git", rev = "09371a2ff9636b5bde273c89686c6aec519aaf95" }
vanilla-boss = { git = "https://github.com/game-swarm/mod-vanilla-boss.git", rev = "e1767a061356287e1b8f71ed804dd732bfb90bcf" }
