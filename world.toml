[world]
name = "World of Swarm"
mode = "persistent"
tick_interval_ms = 3000
world_seed = 0

[events]
enabled = false
resource_boom_multiplier = 2
swarm_invasion_count = 30
ruin_guardian_count = 3
ruin_creep_count = 10
merchant_count = 1

[events.swarm_invasion]
probability = 0.10
interval = 1000
event_cooldown = 1000
duration = 200

[events.resource_boom]
probability = 0.15
interval = 500
event_cooldown = 500
duration = 100

[events.ruin_awakening]
probability = 1.0
interval = 1
event_cooldown = 0
duration = 0

[events.merchant_arrival]
probability = 1.0
interval = 2000
event_cooldown = 2000
duration = 100

[spawn]
policy = "RandomRoom"
respawn = "NewRoom"
cooldown = 0

[code]
update_cost = {}
update_cooldown = 5
update_window = { every = 0, duration = 0 }
propagation_speed = 0
propagation_source = "Spawn"

[drone]
env_vars = true
memory_size = 1024
memory_spawn_cost = {}
memory_upkeep_cost = {}
lifespan = 1500
min_lifespan = 100

[resources]
source_regeneration_rate = 10000
build_cost_multiplier = 10000
drone_decay_rate = 10000

[combat]
pvp_enabled = true
friendly_fire = false
damage_multiplier = 1.0

[[special_effects]]
name = "hack"
description = "Claim-based drone takeover: slow/root/neutralize over five ticks."
handler = "hack"
target = "enemy_drone"
duration = 5
resistance = "Psionic"
required_body_parts = ["Claim"]

[[special_effects]]
name = "drain"
description = "Carry+Work resource drain from enemy storage or drones."
handler = "drain"
target = "enemy_storage"
duration = 0
resistance = "EMP"
required_body_parts = ["Carry", "Work"]

[[special_effects]]
name = "overload"
description = "RangedAttack quota overload: target fuel -500k, floor 20%."
handler = "overload"
target = "enemy_any"
duration = 0
resistance = "EMP"
required_body_parts = ["RangedAttack"]

[[special_effects]]
name = "debilitate"
description = "Work corrosive debuff: selected damage type resistance x2 for 50 ticks."
handler = "debilitate"
target = "enemy_any"
duration = 50
resistance = "Corrosive"
required_body_parts = ["Work"]

[[special_effects]]
name = "disrupt"
description = "Interrupt target current continuous action without HP damage."
handler = "disrupt"
target = "enemy_drone"
duration = 0
resistance = "Sonic"
required_body_parts = ["Attack"]

[[special_effects]]
name = "fortify"
description = "Shield and cleanse self or an ally."
handler = "fortify"
target = "self_or_ally"
duration = 100
required_body_parts = ["Tough"]

[[special_effects]]
name = "leech"
description = "Kinetic life steal attack: 15 damage, heal self for 50% dealt."
handler = "leech"
target = "enemy_any"
duration = 0
resistance = "Kinetic"
required_body_parts = []

[[special_effects]]
name = "fabricate"
description = "Convert enemy drone into an owned structure."
handler = "fabricate"
target = "enemy_drone"
duration = 0
resistance = "Psionic"
required_body_parts = []

[[special_effects]]
name = "heal_self"
description = "Heal the attacker for a configured portion of dealt damage."
handler = "heal_self"
target = "enemy_any"
duration = 0
required_body_parts = []

[[special_effects]]
name = "scramble_commands"
description = "Randomize the target's next command order."
handler = "scramble_commands"
target = "enemy_drone"
duration = 0
required_body_parts = []

[[special_effects]]
name = "convert_to_structure"
description = "Convert target drone into an owned structure."
handler = "convert_to_structure"
target = "enemy_drone"
duration = 0
resistance = "Psionic"
required_body_parts = []
