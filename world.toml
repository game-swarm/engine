[world]
name = "World of Swarm"
mode = "persistent"
tick_interval_ms = 3000
world_seed = 0

[events]
enabled = false
resource_boom_multiplier = 2
swarm_invasion_count = 30
ruin_guardian_count = 3
ruin_creep_count = 10
merchant_count = 1

[events.swarm_invasion]
probability = 0.10
interval = 1000
event_cooldown = 1000
duration = 200

[events.resource_boom]
probability = 0.15
interval = 500
event_cooldown = 500
duration = 100

[events.ruin_awakening]
probability = 1.0
interval = 1
event_cooldown = 0
duration = 0

[events.merchant_arrival]
probability = 1.0
interval = 2000
event_cooldown = 2000
duration = 100

[spawn]
policy = "RandomRoom"
respawn = "NewRoom"
cooldown = 0

[code]
update_cost = {}
update_cooldown = 5
update_window = { every = 0, duration = 0 }
propagation_speed = 0
propagation_source = "Spawn"

[drone]
env_vars = true
memory_size = 1024
memory_spawn_cost = {}
memory_upkeep_cost = {}
lifespan = 1500
min_lifespan = 100

[resources]
source_regeneration_rate = 10000
build_cost_multiplier = 10000
drone_decay_rate = 10000

[combat]
pvp_enabled = true
friendly_fire = false
damage_multiplier = 10000

[mods.combat-core]
damage_multiplier = 10000
repair_hp_per_work_part = 5
repair_energy_per_hp = 1

[mods.depot-storage]
depot_capacity = 10000
depot_hits = 5000
repair_range = 1
repair_capacity = 5

[mods.empire-upkeep]
base_upkeep = 50
room_soft_cap = 10
controller_passive_income = 40
controller_passive_income_rcl_bonus = 5
resource = "Energy"
repair_cap = 3500
distance_decay_bp = 500
recycle_refund_base = 5000
recycle_refund_min = 1000
tutorial_recycle_refund_full_ticks = 500

[mods.fog-of-war]
fog_of_war = true
player_view = "drone"

[mods.pve-spawning]
spawn_interval = 300
max_npcs_per_room = 50
npc_drone_body = ["Attack", "Move", "Move"]
npc_drop_table = { Energy = 50 }

[mods.special-attacks]
special_attacks_enabled = true
enabled = ["Hack", "Drain", "Overload", "Debilitate", "Disrupt", "Fortify", "Leech", "Fabricate"]
tutorial_enabled = ["Hack", "Drain", "Fortify"]
novice_enabled = ["Hack", "Drain", "Overload", "Fortify"]
damage_multiplier = 10000
fabricate_allowed_output_structures = ["Tower"]

[mods.vanilla-boss]
arena_bosses_enabled = true
world_bosses_enabled = true
boss_spawn_interval = 5000

[[mods.vanilla-boss.boss_templates]]
name = "world-alpha"
mode = "world"
hits = 100000
phases = [75, 50, 25]
drops = { Energy = 5000, Mineral = 100 }
spawn_position = { x = 25, y = 25, room = 0 }

[[mods.vanilla-boss.boss_templates]]
name = "arena-champion"
mode = "arena"
hits = 50000
phases = [50, 20]
drops = { ArenaToken = 1 }
spawn_position = { x = 25, y = 25, room = 1 }

[[special_effects]]
name = "hack"
description = "Claim-based drone takeover: slow/root/neutralize over five ticks."
handler = "hack"
target = "enemy_drone"
duration = 5
resistance = "Psionic"
required_body_parts = ["Claim"]

[[special_effects]]
