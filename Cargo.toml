[package]
name = "swarm-engine"
version = "0.1.0"
edition = "2024"

[dependencies]
bevy = "0.15"
blake3 = "1"
ed25519-dalek = "2"
foundationdb = { version = "0.10", default-features = false, features = ["embedded-fdb-include", "fdb-7_3"], optional = true }
futures = { version = "0.3", optional = true }
getrandom = "0.2"
indexmap = { version = "2", features = ["serde"] }
rhai = "1"
redis = "0.27"
reqwest = { version = "0.12", default-features = false, features = ["blocking"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
swarm-wasm-sandbox = { path = "../sandbox" }

[features]
default = []
fdb = ["dep:foundationdb", "dep:futures"]

[dev-dependencies]
tempfile = "3"
wat = "1"
