[workspace]
members = [
    ".",
    "mods/combat-core",
    "mods/depot-storage",
    "mods/empire-upkeep",
    "mods/fog-of-war",
    "mods/pve-spawning",
    "mods/resource-decay",
    "mods/special-attacks",
    "mods/vanilla-boss",
]

[package]
name = "swarm-engine"
version = "0.1.0"
edition = "2024"

[dependencies]
bevy = "0.16"
async-nats = "0.42"
blake3 = "1"
ed25519-dalek = "2"
futures-util = "0.3"
getrandom = "0.2"
indexmap = { version = "2", features = ["serde"] }
redb = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
tokio = { version = "1", features = ["full"] }
toml = "0.8"
swarm-wasm-sandbox = { path = "sandbox" }
swarm-mod-combat-core = { path = "mods/combat-core", optional = true }
swarm-mod-depot-storage = { path = "mods/depot-storage", optional = true }
swarm-mod-empire-upkeep = { path = "mods/empire-upkeep", optional = true }
swarm-mod-fog-of-war = { path = "mods/fog-of-war", optional = true }
swarm-mod-pve-spawning = { path = "mods/pve-spawning", optional = true }
swarm-mod-resource-decay = { path = "mods/resource-decay", optional = true }
swarm-mod-special-attacks = { path = "mods/special-attacks", optional = true }
swarm-mod-vanilla-boss = { path = "mods/vanilla-boss", optional = true }

[features]
default = []
mod_combat_core = ["dep:swarm-mod-combat-core"]
mod_depot_storage = ["dep:swarm-mod-depot-storage"]
mod_empire_upkeep = ["dep:swarm-mod-empire-upkeep"]
mod_fog_of_war = ["dep:swarm-mod-fog-of-war"]
mod_pve_spawning = ["dep:swarm-mod-pve-spawning"]
mod_resource_decay = ["dep:swarm-mod-resource-decay"]
mod_special_attacks = ["dep:swarm-mod-special-attacks"]
mod_vanilla_boss = ["dep:swarm-mod-vanilla-boss"]
vanilla_mods = [
    "mod_combat_core",
    "mod_depot_storage",
    "mod_empire_upkeep",
    "mod_fog_of_war",
    "mod_pve_spawning",
    "mod_resource_decay",
    "mod_special_attacks",
    "mod_vanilla_boss",
]

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
tempfile = "3"
wat = "1"

[[bench]]
name = "rollback_snapshot"
harness = false

[[bench]]
name = "command_throughput"
harness = false

[[bench]]
name = "snapshot_capture"
harness = false

[[bench]]
name = "tick_loop"
harness = false
