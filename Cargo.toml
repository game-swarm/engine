[package]
name = "swarm-engine"
version = "0.1.0"
edition = "2024"

[dependencies]
bevy = "0.16"
blake3 = "1"
ed25519-dalek = "2"
getrandom = "0.2"
indexmap = { version = "2", features = ["serde"] }
rhai = "1"
redis = "1"
reqwest = { version = "0.13", default-features = false, features = ["blocking"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
tikv-client = { version = "0.3", optional = true }
tokio = { version = "1", features = ["rt-multi-thread"], optional = true }
toml = "0.8"
swarm-wasm-sandbox = { path = "sandbox" }

[features]
default = []
tikv = ["dep:tikv-client", "dep:tokio"]

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
tempfile = "3"
wat = "1"

[[bench]]
name = "rollback_snapshot"
harness = false

[[bench]]
name = "command_throughput"
harness = false

[[bench]]
name = "snapshot_capture"
harness = false

[[bench]]
name = "tick_loop"
harness = false
